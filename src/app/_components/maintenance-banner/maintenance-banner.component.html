<div *ngIf="visible" class="alert alert-warning alert-dismissible maintenance-banner" role="status">
  <span>{{ displayText }}<span *ngIf="postedText" class="maintenance-banner-posted"> ({{ postedText }})</span></span>
  <button type="button" class="close" aria-label="Dismiss maintenance notice" (click)="dismiss()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
