<div class="maintenance-window-dialog-content">
  <div class="dialog-header">
    <h5 class="section-title">{{ isEdit ? 'Edit' : 'Schedule' }} Maintenance</h5>
    <button class="close-btn" (click)="cancel()">&times;</button>
  </div>

  <div class="dialog-body">
    <div class="form-row">
      <label>
        <input type="checkbox" [(ngModel)]="enabled" name="enabled" />
        Show banner to site visitors
      </label>
    </div>

    <div class="form-row date-hour-row">
      <div>
        <label for="date">Date (Pacific)</label>
        <input id="date" type="date" [(ngModel)]="date" name="date" [min]="minDate" />
      </div>
      <div>
        <label for="hour">Hour (Pacific)</label>
        <select id="hour" [(ngModel)]="hour" name="hour">
          <option *ngFor="let h of hours" [ngValue]="h.value">{{ h.label }}</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label for="message">Custom message (optional)</label>
      <textarea
        id="message"
        [(ngModel)]="message"
        name="message"
        rows="3"
        placeholder="Leave blank to auto-generate from the scheduled start time"
      ></textarea>
    </div>

    <div *ngIf="state === 'error'" class="status-text error">{{ errorMessage }}</div>
  </div>

  <div class="dialog-footer">
    <button class="btn-secondary" (click)="cancel()">Cancel</button>
    <button class="btn-pill" (click)="save()" [disabled]="state === 'saving'">
      {{ state === 'saving' ? 'Saving...' : 'Save' }}
    </button>
  </div>
</div>
