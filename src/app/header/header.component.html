<header>
  <nav class="navbar navbar-expand-lg d-flex blue-fill" [class.login-open]="loginBox">

    <div class="top-nav">
      <div class="navbar-brand">
        <div class="hamburger">
          <button class="navbar-toggler" type="button" (click)="toggleNav()" aria-label="Toggle navigation">
            <mat-icon color="accent">menu</mat-icon>
          </button>
        </div>
        <!-- logo -->
        <a href="/" class="d-flex">
              <img src="../assets/logo-app-sm.png" width="30" height="30" class="d-inline-block align-top" alt="reframe logo">
              <div class="site-name">
                <span class="bold">reframe</span><span class="thin">db</span>
              </div>
              <div class="site-subtitle">
                <span class="wide">open & extendable </span><span class="narrow">drug repurposing data</span>
              </div>
            </a>
      </div>
    </div>

    <div class="nav-body d-flex">
      <div class="collapse navbar-collapse" id="navbarContent" [ngClass]="{'logout-wrap': loggedIn, 'show': expanded}">
        <div class="search" id="searchContent">
          <app-quick-search></app-quick-search>
        </div>
        <ul class="navbar-nav ml-auto">
          <li class="menu-item">
            <a routerLink="/assays" (click)="collapseNav()">assays</a>
          </li>
          <li class="menu-item">
            <a routerLink="/ontology-tree" [queryParams]="{src: '0'}" (click)="collapseNav()">ontology tree</a>
          </li>
          <li class="menu-item">
            <a routerLink="/workflow" (click)="collapseNav()">workflow</a>
          </li>
          <li class="menu-item">
            <a routerLink="/about" (click)="collapseNav()">about</a>
          </li>
          <li class="menu-item" *ngIf="loggedIn">
            <a routerLink="/user_portal/my_account" (click)="collapseNav()">user portal</a>
          </li>
          <li class="menu-item" *ngIf="isAdmin">
            <a routerLink="/internal/proposals" (click)="collapseNav()">calibr admins</a>
          </li>
          <li class="menu-item">
            <a routerLink="/contact-us" (click)="collapseNav()">contact us</a>
          </li>
          <li class="menu-item sign-in" [hidden]="loggedIn">
            <a *ngIf="!loggedIn" (click)="showLogin()" (click)="clickedInside($event)">sign in</a>
          </li>

          <li class="reveal user-login" [ngClass]="{'open': loginBox, 'logout': loggedIn, 'sign-in-box': !loggedIn, 'show': expanded}">
            <div class="login-sheet" (click)="clickedInside($event)">
              <div class="sheet-header">
                <button class="sheet-close" (click)="showLogin()" aria-label="Close">&#x2715;</button>
              </div>
              <app-user-login></app-user-login>
            </div>
          </li>
        </ul>
      </div>
    </div>

  </nav>
</header>
